<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingshot Guide - Produced by TEREA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #0a0a0a; /* 純粋な黒に近いグレー */
            color: #d4d4d8;
            -webkit-font-smoothing: antialiased;
            scroll-behavior: smooth;
        }
        .chic-border {
            border-color: rgba(255, 255, 255, 0.1);
        }
        .hover-bg:active {
            background-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>terea-hub.github.io-main
<body>

    <!-- ナビゲーション -->
    <nav class="border-b chic-border bg-[#0a0a0a]/90 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-2xl mx-auto px-6 h-16 flex justify-between items-center">
            <span class="text-sm font-bold tracking-widest text-white uppercase">Kingshot Guide</span>
            <span class="text-[10px] tracking-[0.2em] text-zinc-500 uppercase font-medium">Produced by TEREA</span>
        </div>
    </nav>

    <!-- ヒーロー -->
    <header class="max-w-2xl mx-auto px-6 py-20">
        <h1 class="text-3xl font-bold text-white mb-4 tracking-tight">Kingshot Guide</h1>
        <p class="text-sm text-zinc-500 leading-relaxed max-w-md">
            戦略と、同盟イベント進行、価値観の共有を<br>
            ミニマルかつ本質的な攻略アーカイブ（になる予定）
        </p>
    </header>

    <!-- メイン -->
    <main class="max-w-2xl mx-auto px-6 pb-24 space-y-16">
        
        <!-- 目次 -->
        <section class="space-y-10">
            <h2 class="text-xs font-bold text-zinc-500 uppercase tracking-[0.2em]">Index</h2>

            <!-- 同盟イベント -->
            <div>
                <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em]">同盟イベント</p>
                <p class="text-[11px] text-zinc-600 leading-relaxed mt-1 mb-2">戦略の押し付けではなく、情報共有が目的です。使えそうなところだけ拾って下さい。</p>
                <div class="space-y-1">
                    <a class="flex justify-between items-center py-4 border-b chic-border hover:text-white transition-colors group">
                        <button
                            type="button"
                            id="expand-sword"
                            class="text-lg font-medium tracking-tight flex items-center gap-2 group focus:outline-none"
                            aria-expanded="false"
                            aria-controls="sword-options"
                        >
                            聖剣争奪戦
                        </button>
                        <div id="sword-options" class="hidden mt-2 pl-4 space-y-1">
                            <a href="swordland/index.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">ゲーム進行</a>
                            <a href="swordland/rally.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">都市攻撃の考え方</a>
                            <a href="swordland/facility_control.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">施設攻撃・駐屯の考え方</a>
                        </div>
                        <script>
                            document.addEventListener('DOMContentLoaded', function () {
                                const expandBtn = document.getElementById("expand-sword");
                                const expandContent = document.getElementById("sword-options");
                                expandBtn.addEventListener('click', function (e) {
                                    e.preventDefault();
                                    expandContent.classList.toggle("hidden");
                                    expandBtn.setAttribute('aria-expanded', !expandContent.classList.contains("hidden"));
                                });
                            });
                        </script>
                    </a>
                    <a class="flex justify-between items-center py-4 border-b chic-border hover:text-white transition-colors group">
                        <button
                            type="button"
                            id="expand-tri"
                            class="text-lg font-medium tracking-tight flex items-center gap-2 group focus:outline-none"
                            aria-expanded="false"
                            aria-controls="tri-options"
                        >
                            三盟争覇戦
                        </button>
                        <div id="tri-options" class="hidden mt-2 pl-4 space-y-1">
                            <a href="tri_alliance/progress.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">ゲームの進行</a>
                            <a href="tri_alliance/battle_mechanics.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">戦闘解説</a>
                        </div>
                        <script>
                            document.addEventListener('DOMContentLoaded', function () {
                                const expandBtn = document.getElementById("expand-tri");
                                const expandContent = document.getElementById("tri-options");
                                expandBtn.addEventListener('click', function (e) {
                                    e.preventDefault();
                                    expandContent.classList.toggle("hidden");
                                    expandBtn.setAttribute('aria-expanded', !expandContent.classList.contains("hidden"));
                                });
                            });
                        </script>
                    </a>
                </div>
            </div>

            <!-- 指南 -->
            <div>
                <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.2em]">編成方針</p>
                <p class="text-[11px] text-zinc-600 leading-relaxed mt-1 mb-2">足並みが揃うほど、守りは強くなります。</p>
                <div class="space-y-1">
                    <a class="flex justify-between items-center py-4 border-b chic-border hover:text-white transition-colors group">
                        <button
                            type="button"
                            id="expand-garrison"
                            class="text-lg font-medium tracking-tight flex items-center gap-2 group focus:outline-none"
                            aria-expanded="false"
                            aria-controls="garrison-options"
                        >
                            王城戦
                        </button>
                        <div id="garrison-options" class="hidden mt-2 pl-4 space-y-1">
                            <a href="Garrison_Defense/60/40/00_Garrison_Guide.html" class="block text-sm font-medium text-zinc-300 hover:text-white px-2 py-1 rounded transition-colors">王城駐屯 60/40/00編成</a>
                        </div>
                        <script>
                            document.addEventListener('DOMContentLoaded', function () {
                                const expandBtn = document.getElementById("expand-garrison");
                                const expandContent = document.getElementById("garrison-options");
                                expandBtn.addEventListener('click', function (e) {
                                    e.preventDefault();
                                    expandContent.classList.toggle("hidden");
                                    expandBtn.setAttribute('aria-expanded', !expandContent.classList.contains("hidden"));
                                });
                            });
                        </script>
                    </a>
                </div>
            </div>

        </section>

    </main>

    <!-- フッター -->
    <footer class="border-t chic-border py-12">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <p class="text-[10px] tracking-[0.3em] text-zinc-600 font-bold uppercase">
                Produced by TEREA &copy; 2024
            </p>
        </div>
    </footer>

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (href === "#") return;
                e.preventDefault();
                const target = document.querySelector(href);
                if (target) {
                    const offset = 100;
                    const bodyRect = document.body.getBoundingClientRect().top;
                    const elementRect = target.getBoundingClientRect().top;
                    window.scrollTo({
                        top: elementRect - bodyRect - offset,
                        behavior: 'smooth'
                    });
                }
            });
        });
    </script>
</body>
</html>
